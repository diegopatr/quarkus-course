# Configurações da aplicação Aula 03 — Jakarta REST
# O Quarkus lê este arquivo automaticamente ao iniciar

# Porta do servidor HTTP (padrão: 8080)
quarkus.http.port=8080

# Formato de log mais legível em desenvolvimento
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# Habilita CORS para permitir chamadas de frontends em outros domínios
quarkus.http.cors=true
quarkus.http.cors.origins=*
